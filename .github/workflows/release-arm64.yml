name: Release ARM64

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release-arm64:
    name: Build Raspberry Pi ARM64 release
    runs-on: ubuntu-latest

    env:
      TARGET: aarch64-unknown-linux-gnu
      ARCHIVE: iris-aarch64-unknown-linux-gnu.tar.gz
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install ARM64 linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build ARM64 binary
        run: cargo build --locked --release --features rpi-gpio --target "$TARGET"

      - name: Package release asset
        run: |
          mkdir -p dist/iris
          cp "target/$TARGET/release/iris" dist/iris/
          cp README.md dist/iris/
          cp -r profiles dist/iris/
          tar -C dist -czf "$ARCHIVE" iris

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ARCHIVE" --clobber
