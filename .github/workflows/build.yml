name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build default target
        run: cargo build --locked --no-default-features

      - name: Check Raspberry Pi GPIO feature
        run: cargo check --locked --features rpi-gpio
